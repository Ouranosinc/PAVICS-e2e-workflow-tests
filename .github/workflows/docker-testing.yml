name: Docker-based Testing Suite

on:
  push:
    branches:
      - master
  pull_request:

env:
  TEST_TAG: workflow-tests:test

jobs:
  build:
    name: Build Docker image and run smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          disable-sudo: true
          egress-policy: audit
      
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image (no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: "{{defaultContext}}:docker"
          file: "Dockerfile"
          tags: ${{ env.TEST_TAG }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Gather artifacts
        run: |
          docker create --name test ${{ env.TEST_TAG }}
          mkdir build-artifacts
          docker cp test:/conda-env-export-final.yml build-artifacts/conda-env-export.yml
          docker rm test

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-env-export.yml
          path: build-artifacts
